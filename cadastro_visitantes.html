<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Visitantes — Lojas de Castro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #1a3a2a;
      --verde-medio: #2d5a3d;
      --verde-claro: #4a8c5c;
      --verde-suave: #e8f4ec;
      --verde-borda: #c2dfc9;
      --dourado: #c8a96e;
      --dourado-claro: #f0e4c8;
      --creme: #faf7f2;
      --texto: #1c2820;
      --texto-muted: #5a6b5e;
      --branco: #ffffff;
      --radius: 10px;
      --radius-lg: 16px;
      --sombra: 0 4px 32px rgba(26,58,42,0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--creme);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--verde);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        45deg, transparent, transparent 40px,
        rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px
      );
    }

    .logo-area { position: relative; z-index: 1; }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,169,110,0.4);
      border-radius: 100px;
      padding: 6px 20px 6px 8px;
      margin-bottom: 1.5rem;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--dourado);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-badge span {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 400;
      color: var(--branco);
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    header h1 em { color: var(--dourado); font-style: italic; }

    header p {
      font-size: 15px; font-weight: 300;
      color: rgba(255,255,255,0.6);
      max-width: 420px; margin: 0 auto;
    }

    .divider-ornament { text-align: center; margin: -1px 0; line-height: 0; }
    .divider-ornament svg { display: block; width: 100%; }

    main {
      flex: 1;
      padding: 3rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: var(--branco);
      border-radius: var(--radius-lg);
      box-shadow: var(--sombra);
      border: 1px solid var(--verde-borda);
      padding: 2.5rem;
      width: 100%; max-width: 640px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.25rem; margin-top: 2rem;
    }
    .section-header:first-child { margin-top: 0; }

    .section-icon {
      width: 30px; height: 30px;
      background: var(--verde-suave);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 600; color: var(--verde);
    }

    .sep { border: none; border-top: 1px dashed var(--verde-borda); margin: 1.75rem 0; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-2 .full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 13px; font-weight: 500;
      color: var(--texto-muted); letter-spacing: 0.02em;
    }

    input[type="text"], input[type="email"], input[type="tel"],
    select, textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--texto);
      background: var(--creme);
      border: 1.5px solid var(--verde-borda);
      border-radius: var(--radius);
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input::placeholder, textarea::placeholder { color: #aabcb0; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--verde-claro);
      background: var(--branco);
      box-shadow: 0 0 0 3px rgba(74,140,92,0.12);
    }

    textarea { resize: vertical; min-height: 88px; }

    .lgpd-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 14px 16px;
      background: var(--verde-suave);
      border: 1px solid var(--verde-borda);
      border-radius: var(--radius);
    }

    .lgpd-row input[type="checkbox"] {
      width: 17px; height: 17px;
      accent-color: var(--verde-medio);
      flex-shrink: 0; margin-top: 2px; cursor: pointer;
    }

    .lgpd-row label {
      font-size: 13px; color: var(--texto-muted);
      line-height: 1.5; cursor: pointer;
    }

    .btn-submit {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px 24px; margin-top: 1.5rem;
      background: var(--verde); color: var(--branco);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; letter-spacing: 0.02em;
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(26,58,42,0.25);
    }

    .btn-submit:hover { background: var(--verde-medio); box-shadow: 0 4px 18px rgba(26,58,42,0.30); }
    .btn-submit:active { transform: scale(0.985); }

    .btn-submit .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: 0.6; }

    .status {
      margin-top: 14px; padding: 12px 16px;
      border-radius: var(--radius); font-size: 14px;
      display: none; animation: fadeUp 0.3s ease;
    }
    .status.success { display: flex; align-items: center; gap: 8px; background: #e8f4ec; color: #1a4a2a; border: 1px solid #a8d4b4; }
    .status.error   { display: flex; align-items: center; gap: 8px; background: #fdecea; color: #8b1a1a; border: 1px solid #f5b4b0; }
    .status.loading { display: flex; align-items: center; gap: 8px; background: var(--dourado-claro); color: #5a4010; border: 1px solid #e0c98a; }

    footer {
      text-align: center; padding: 1.5rem;
      font-size: 12px; color: var(--texto-muted);
      border-top: 1px solid var(--verde-borda);
    }
    footer a { color: var(--verde-claro); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .card { padding: 1.5rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-2 .full { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-badge">
      <div class="logo-icon">🏪</div>
      <span>Lojas de Castro</span>
    </div>
    <h1>Cadastre-se e fique por <em>dentro</em></h1>
    <p>Receba novidades, promoções exclusivas e as melhores ofertas direto para você.</p>
  </div>
</header>

<div class="divider-ornament">
  <svg viewBox="0 0 1440 32" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" height="32">
    <path d="M0,0 L1440,0 L1440,32 Q720,0 0,32 Z" fill="#1a3a2a"/>
  </svg>
</div>

<main>
  <div class="card">

    <div class="section-header">
      <div class="section-icon">👤</div>
      <h2>Seus dados</h2>
    </div>

    <div class="grid-2">
      <div class="field full">
        <label for="v-nome">Nome completo *</label>
        <input type="text" id="v-nome" placeholder="Ana Paula Silva" autocomplete="name" />
      </div>
      <div class="field">
        <label for="v-email">E-mail *</label>
        <input type="email" id="v-email" placeholder="ana@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="v-telefone">Telefone / WhatsApp</label>
        <input type="tel" id="v-telefone" placeholder="(42) 99999-0000" autocomplete="tel" />
      </div>
    </div>

    <hr class="sep" />

    <div class="section-header">
      <div class="section-icon">📍</div>
      <h2>Localização</h2>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="v-cidade">Cidade</label>
        <input type="text" id="v-cidade" placeholder="Castro" />
      </div>
      <div class="field">
        <label for="v-estado">Estado</label>
        <select id="v-estado">
          <option value="">Selecione</option>
          <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
          <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
          <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
          <option>MG</option><option>PA</option><option>PB</option><option selected>PR</option>
          <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
          <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
          <option>SP</option><option>SE</option><option>TO</option>
        </select>
      </div>
    </div>

    <hr class="sep" />

    <div class="section-header">
      <div class="section-icon">💬</div>
      <h2>Seu interesse</h2>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="v-origem">Como nos encontrou?</label>
        <select id="v-origem">
          <option value="">Selecione</option>
          <option>Busca no Google</option>
          <option>Instagram / Facebook</option>
          <option>Indicação de amigo</option>
          <option>Anúncio online</option>
          <option>Passando pela loja</option>
          <option>Outros</option>
        </select>
      </div>
      <div class="field">
        <label for="v-categoria">Categoria de interesse</label>
        <select id="v-categoria">
          <option value="">Selecione</option>
          <option>Roupas femininas</option>
          <option>Roupas masculinas</option>
          <option>Calçados</option>
          <option>Acessórios</option>
          <option>Promoções gerais</option>
          <option>Outros</option>
        </select>
      </div>
      <div class="field full">
        <label for="v-mensagem">Mensagem ou observação</label>
        <textarea id="v-mensagem" placeholder="Deixe sua mensagem, dúvida ou sugestão..."></textarea>
      </div>
    </div>

    <hr class="sep" />

    <div class="lgpd-row">
      <input type="checkbox" id="v-lgpd" />
      <label for="v-lgpd">
        Concordo com o tratamento dos meus dados pessoais pela <strong>Lojas de Castro</strong>
        para fins de comunicação comercial, conforme a
        <strong>Lei Geral de Proteção de Dados (LGPD — Lei 13.709/2018)</strong>.
        Meus dados não serão compartilhados com terceiros.
      </label>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="enviarCadastro()">
      <div class="spinner"></div>
      <span class="btn-text">✉ Enviar cadastro</span>
    </button>

    <div id="statusMsg" class="status"></div>

  </div>
</main>

<footer>
  <p>
    © 2025 <a href="https://www.lojasdecastro.com.br" target="_blank">Lojas de Castro</a>
    &nbsp;·&nbsp; Seus dados são protegidos pela LGPD
    &nbsp;·&nbsp; Desenvolvido com ♥
  </p>
</footer>

<script>
  /* ── Configuração GitHub (invisível ao visitante) ── */
  const GH_OWNER = "luizdecaxtro";
  const GH_REPO  = "cadastroclientes";
  const GH_TOKEN = "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";

  /* ── Utilitários ── */
  const val = id => document.getElementById(id).value.trim();
  const el  = id => document.getElementById(id);

  /* ── Máscara de telefone ── */
  el('v-telefone').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').substring(0, 11);
    if (v.length >= 7)      v = v.replace(/^(\d{2})(\d{4,5})(\d{0,4})$/, '($1) $2-$3');
    else if (v.length >= 3) v = v.replace(/^(\d{2})(\d+)$/, '($1) $2');
    this.value = v;
  });

  /* ── Status ── */
  function mostrarStatus(msg, tipo) {
    const s = el('statusMsg');
    const icones = { success: '✅', error: '❌', loading: '⏳' };
    s.innerHTML = `<span>${icones[tipo]}</span> <span>${msg}</span>`;
    s.className = 'status ' + tipo;
    if (tipo !== 'loading') setTimeout(() => { s.style.display = 'none'; }, 7000);
  }

  /* ── Limpar formulário ── */
  function limpar() {
    ['v-nome','v-email','v-telefone','v-cidade','v-estado',
     'v-origem','v-categoria','v-mensagem'].forEach(id => el(id).value = '');
    el('v-lgpd').checked = false;
    el('v-estado').value = 'PR';
  }

  /* ── Envio principal ── */
  async function enviarCadastro() {
    const nome  = val('v-nome');
    const email = val('v-email');
    const lgpd  = el('v-lgpd').checked;

    if (!nome)  { mostrarStatus('Por favor, informe seu nome completo.', 'error'); el('v-nome').focus(); return; }
    if (!email || !email.includes('@')) { mostrarStatus('Informe um e-mail válido.', 'error'); el('v-email').focus(); return; }
    if (!lgpd)  { mostrarStatus('É necessário aceitar os termos da LGPD para continuar.', 'error'); return; }

    const btn = el('btnSubmit');
    btn.classList.add('loading');
    btn.disabled = true;
    mostrarStatus('Enviando seus dados…', 'loading');

    const agora   = new Date();
    const nomeArq = `visitantes/${agora.getFullYear()}-${String(agora.getMonth()+1).padStart(2,'0')}/cadastro_${agora.getTime()}.json`;

    const dados = {
      id:                  agora.getTime(),
      data_cadastro:       agora.toLocaleString('pt-BR'),
      timestamp_iso:       agora.toISOString(),
      nome,
      email,
      telefone:            val('v-telefone'),
      cidade:              val('v-cidade'),
      estado:              val('v-estado'),
      como_encontrou:      val('v-origem'),
      categoria_interesse: val('v-categoria'),
      mensagem:            val('v-mensagem'),
      lgpd_aceite:         true,
      origem_site:         'lojasdecastro.com.br'
    };

    const conteudo = btoa(unescape(encodeURIComponent(JSON.stringify(dados, null, 2))));

    try {
      const resp = await fetch(
        `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${nomeArq}`,
        {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${GH_TOKEN}`,
            'Content-Type': 'application/json',
            'X-GitHub-Api-Version': '2022-11-28'
          },
          body: JSON.stringify({
            message: `Cadastro: ${nome} — ${agora.toLocaleString('pt-BR')}`,
            content: conteudo
          })
        }
      );

      if (resp.status === 201) {
        mostrarStatus(`Obrigado, ${nome}! Cadastro realizado com sucesso. Em breve entraremos em contato. 🎉`, 'success');
        limpar();
      } else {
        const err = await resp.json().catch(() => ({}));
        mostrarStatus(`Erro ao salvar (${resp.status}): ${err.message || 'Tente novamente.'}`, 'error');
      }
    } catch (e) {
      mostrarStatus('Falha de conexão. Verifique sua internet e tente novamente.', 'error');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
